# Per-project orchestrator config. Read by packages/backend/src/session/orchestrator-config.ts.
# Silent no-op if missing; defaults are empty arrays / empty string.

# Commands the orchestrator runs in the worktree after PR open, before review spawn.
# Mechanical fixes only — failures are logged and review proceeds.
autofix:
  - npm run format:write
  - npm run lint:fix

# Commands the session runs as a fast-fail before pushing. Injected into the
# orchestrator-generated CLAUDE.md Pre-PR Gate section.
verify:
  - npx tsc --noEmit -p packages/frontend/tsconfig.json
  - npx tsc --noEmit -p packages/backend/tsconfig.json
  - npm run build

# GitHub check-run names treated as authoritative for pass/fail mergeability.
# Single job in .github/workflows/build.yml is named "build".
ci_check_name:
  - build

# Commands the orchestrator runs as authoritative tests per head-SHA.
# Empty list = feature off (no-op). Each command is run with a per-command timeout.
test: []

# Per-command timeout in seconds for test commands. Default 300 (5 min).
test_timeout_sec: 300

# Commands the orchestrator runs on each PR before spawning review — catches lint errors and license contamination.
# Phase 1 baseline: eslint errors + GPL/AGPL dependency check. Warnings tolerated (11-warning baseline on dev).
analyze:
  - npm run lint
  - npm run audit:licenses

# Timeout in seconds for the analyze phase.
analyze_timeout_sec: 180

# Maximum RSS in MB for the analyze phase.
analyze_max_rss_mb: 2048

# Extra Bash tool permission patterns merged with the base allowed-tools set.
allowed_tools: []

# Extra Bash rule text injected into the session-facing CLAUDE.md.
bash_rules: []

# Path (relative to project root) to a script run after worktree creation, before session spawn.
bootstrap_script: ''
