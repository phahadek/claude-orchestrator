name: CI

on:
  push:
    branches: [dev, main]
    paths-ignore:
      - '**/*.md'
      - '.git-blame-ignore-revs'
      - 'docs/**'
  pull_request:
    branches: [dev, main]
    paths-ignore:
      - '**/*.md'
      - '.git-blame-ignore-revs'
      - 'docs/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck frontend
        run: npx tsc --noEmit -p packages/frontend/tsconfig.json

      - name: Typecheck backend
        run: npx tsc --noEmit -p packages/backend/tsconfig.json

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Verify systemd unit
        run: |
          # systemd-analyze verify resolves ExecStart's binary and fails if it is
          # missing. The unit targets /usr/bin/node (the NodeSource path on the
          # production host), but actions/setup-node installs node under the runner
          # toolcache, so /usr/bin/node is absent on CI. Symlink it so verify can
          # validate the canonical unit without weakening it for production.
          sudo ln -sf "$(command -v node)" /usr/bin/node
          systemd-analyze verify installers/linux/orchestrator.service
