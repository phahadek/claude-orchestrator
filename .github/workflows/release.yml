name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: ./installers/windows/build.ps1

      - name: Rename artifact
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mv installers/windows/dist/claude-orchestrator-setup.exe \
             "installers/windows/dist/ClaudeOrchestrator-Setup-${VERSION}-win-x64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "installers/windows/dist/ClaudeOrchestrator-Setup-${{ steps.version.outputs.VERSION }}-win-x64.exe"
          if-no-files-found: error

  release-macos:
    name: Build macOS Installer
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install npm dependencies
        run: npm ci

      - name: Build macOS installer
        run: ./installers/macos/build.sh

      - name: Rename artifact
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mv installers/macos/build/ClaudeOrchestrator.dmg \
             "installers/macos/build/ClaudeOrchestrator-Setup-${VERSION}-macos-arm64.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: "installers/macos/build/ClaudeOrchestrator-Setup-${{ steps.version.outputs.VERSION }}-macos-arm64.dmg"
          if-no-files-found: error

  release-linux:
    name: Build Linux Installers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install npm dependencies
        run: npm ci

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y dpkg-sig

      - name: Download appimagetool
        run: |
          curl -fsSL \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Build .deb package
        env:
          LINUX_GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
        run: ./installers/linux/build-deb.sh "${{ steps.version.outputs.VERSION }}"

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./installers/linux/build-appimage.sh "${{ steps.version.outputs.VERSION }}"

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mv "dist/linux/claude-orchestrator_${VERSION}_amd64.deb" \
             "dist/linux/ClaudeOrchestrator-Setup-${VERSION}-linux-amd64.deb"
          mv "dist/linux/claude-orchestrator-${VERSION}-x86_64.AppImage" \
             "dist/linux/ClaudeOrchestrator-Setup-${VERSION}-linux-x64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist/linux/ClaudeOrchestrator-Setup-${{ steps.version.outputs.VERSION }}-linux-amd64.deb
            dist/linux/ClaudeOrchestrator-Setup-${{ steps.version.outputs.VERSION }}-linux-x64.AppImage
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [release-windows, release-macos, release-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Detect pre-release
        id: prerelease
        run: |
          if [[ "$GITHUB_REF_NAME" =~ -[a-zA-Z] ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BODY=""
          if [ -f "CHANGELOG.md" ]; then
            BODY=$(awk "/^## \\[?v?${VERSION}\\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          fi
          if [ -z "${BODY}" ]; then
            BODY="Release ${GITHUB_REF_NAME}"
          fi
          {
            echo "BODY<<EOF"
            echo "${BODY}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.BODY }}
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
